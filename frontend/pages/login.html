<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="{% static 'js/utils/api.js' %}"></script>
  <script src="{% static 'js/login.js' %}" defer></script>
  <script src="{% static 'js/nav.js' %}" defer></script>
  <title>EventsHub — Login</title>


  <style>
    @import url('https://fonts.googleapis.com/css2?family=BBH+Sans+Hegarty&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Open+Sans:wght@560&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Squada+One&display=swap');
  </style>

  <link rel="stylesheet" href="{% static 'css/authentication.css' %}">
</head>

<body>
  <div class="container">
    <aside class="left">
      <div class="logo">
        <img src="{% static 'imgs/ticket.png' %}" alt="">
        <span class="logo-text">EventsHub</span>
      </div>
      <div class="maintext">
        <h2 class="p1">
          Discover tailored events.<br>
        </h2>
        <h2 class="p2"> Sign in for personalized<br>
          recommendations today!
      </div>

    </aside>

    <main class="right">
      <div class="mainr">
        <button class="close">✕</button>

        <h2 class="title">Login</h2>

        <div class="social-box">
          <button class="social google"><img src="{% static 'imgs/Icon.png' %}" alt=""> Login with Google</button>
          <button class="social fb"><img src="{% static 'imgs/icons8-facebook 1.png' %}" alt=""> Login with Facebook</button>
        </div>

        <div class="OR">OR</div>

        <form class="login-form" autocomplete="off" novalidate>
          <label class="field">
            <span class="field-label">E-mail Address</span>
            <input type="email" name="email" placeholder="Enter your e-mail" required>
          </label>

          <label class="field password-field">
            <span class="field-label">Password</span>
            <input type="password" name="password" placeholder="Enter your password" required>
          </label>

          <button type="submit" class="btn login-btn">Login</button>
        </form>

        <p class="signup">Don’t have an account? <a href="./Sign-up.html">Sign up</a></p>
      </div>
    </main>
  </div>

</body>

</html>
